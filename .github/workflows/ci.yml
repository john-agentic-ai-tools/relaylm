name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: "Gate: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run ruff linting
        run: ruff check src/ tests/

  security:
    name: "Gate: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep scan
        run: semgrep --config=.semgrep/semgrep.yml src/

  deps:
    name: "Gate: Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit

  tests:
    name: "Gate: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run pytest
        run: pytest --cov=src/ --cov-report=term-missing

  docs:
    name: "Gate: Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Install docs tools
        run: |
          pip install pymarkdownlnt codespell
      - name: Run markdownlint
        run: pymarkdownlnt --config .pymarkdownlnt.yml scan README.md docs/ CONTRIBUTING.md CODE_OF_CONDUCT.md
      - name: Run spell check
        run: codespell --skip=".git,.venv,specs,__pycache__" README.md docs/ CONTRIBUTING.md CODE_OF_CONDUCT.md
      - name: Run docs sync check
        run: python scripts/check_docs_sync.py README.md docs/guide.md docs/config.md

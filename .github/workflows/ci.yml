name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: "Gate: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Create virtual environment
        run: uv venv --python ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv pip install ".[dev]"
      - name: Run ruff linting
        run: uv run ruff check src/ tests/

  security:
    name: "Gate: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Create virtual environment
        run: uv venv --python ${{ env.PYTHON_VERSION }}
      - name: Install semgrep
        run: uv pip install semgrep
      - name: Run semgrep scan
        run: uv run semgrep --config=.semgrep/semgrep.yml src/

  deps:
    name: "Gate: Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Create virtual environment
        run: uv venv --python ${{ env.PYTHON_VERSION }}
      - name: Install project
        run: uv pip install ".[dev]"
      - name: Audit dependencies
        run: |
          uv pip install pip-audit
          uv run pip-audit

  tests:
    name: "Gate: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Create virtual environment
        run: uv venv --python ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv pip install ".[dev]"
      - name: Run pytest
        run: uv run pytest --cov=src/ --cov-report=term-missing

  tests-wsl2:
    name: "Gate: Tests (Windows WSL2)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up WSL2 (Ubuntu 22.04)
        uses: Vampire/setup-wsl@6c400b755bcd0583e60c2e7aa0cdc61794355c9b
        with:
          distribution: Ubuntu-22.04
          additional-packages: python3 python3-pip python3-venv git curl ca-certificates
      - name: Install uv and run unit tests inside WSL2
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --python 3.11
          uv pip install ".[dev]"
          uv run --with pytest pytest tests/unit -q

  docs:
    name: "Gate: Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Create virtual environment
        run: uv venv --python ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv pip install ".[dev]"
      - name: Install docs tools
        run: |
          uv pip install pymarkdownlnt codespell
      - name: Run markdownlint
        run: uv run pymarkdownlnt --config .pymarkdownlnt.yml scan README.md docs/ CONTRIBUTING.md CODE_OF_CONDUCT.md
      - name: Run spell check
        run: uv run codespell --skip=".git,.venv,specs,__pycache__" README.md docs/ CONTRIBUTING.md CODE_OF_CONDUCT.md
      - name: Run docs sync check
        run: uv run python scripts/check_docs_sync.py README.md docs/guide.md docs/config.md

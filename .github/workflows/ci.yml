name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: "Gate: Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv pip install --system ".[dev]"
      - name: Run ruff linting
        run: ruff check src/ tests/

  security:
    name: "Gate: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install semgrep
        run: uv pip install --system semgrep
      - name: Run semgrep scan
        run: semgrep --config=.semgrep/semgrep.yml src/

  deps:
    name: "Gate: Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install project
        run: uv pip install --system ".[dev]"
      - name: Audit dependencies
        run: |
          uv pip install --system pip-audit
          pip-audit

  tests:
    name: "Gate: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv pip install --system ".[dev]"
      - name: Run pytest
        run: pytest --cov=src/ --cov-report=term-missing

  docs:
    name: "Gate: Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv pip install --system ".[dev]"
      - name: Install docs tools
        run: |
          uv pip install --system pymarkdownlnt codespell
      - name: Run markdownlint
        run: pymarkdownlnt --config .pymarkdownlnt.yml scan README.md docs/ CONTRIBUTING.md CODE_OF_CONDUCT.md
      - name: Run spell check
        run: codespell --skip=".git,.venv,specs,__pycache__" README.md docs/ CONTRIBUTING.md CODE_OF_CONDUCT.md
      - name: Run docs sync check
        run: python scripts/check_docs_sync.py README.md docs/guide.md docs/config.md
